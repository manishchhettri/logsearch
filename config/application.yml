  #         file-pattern: ".*\\.log(\\.gz)?"
  #         retention-days: 30
  #         servers:
  #           - name: "IIB Node 1"
  #             url: "http://iib-uat-1:4414/logs/"
  #           - name: "IIB Node 2"
  #             url: "http://iib-uat-2:4414/logs/"
  #
  #   # Development Environment
  #   dev:
  #     display-name: "Development"
  #     enabled: false  # Can disable entire environments
  #     systems:
  #       - name: "all-apps"
  #         display-name: "Dev Server"
  #         url: "http://dev-server:8080/logs/"
  #         target-path: "./logs/dev"
  #         file-pattern: ".*\\.log"
  #         retention-days: 7

  # ============================================================================
  # ACTIVE TEST CONFIGURATION (Commented out temporarily)
