# External Log Search Configuration
# Place this file alongside the JAR or in a ./config/ directory
# Override any settings by editing this file - no need to rebuild the JAR!

server:
  port: 8080

# JVM Configuration (used by start.sh / start.bat)
jvm:
  # Heap size configuration
  # Examples: 512m, 1g, 2g, 4g, 8g, 12g
  # Recommended:
  #   - 1-2 GB raw logs/day: 2g
  #   - 5 GB raw logs/day: 4-6g
  #   - 10 GB raw logs/day: 8-12g
  #   - 20+ GB raw logs/day: 16g+
  heap-min: ${JVM_HEAP_MIN:2g}
  heap-max: ${JVM_HEAP_MAX:4g}

  # Additional JVM options (optional)
  # Default uses G1GC for better performance with large heaps
  extra-opts: ${JVM_EXTRA_OPTS:-XX:+UseG1GC -XX:MaxGCPauseMillis=200}

log-search:
  # Directory containing log files to index
  logs-dir: ${LOGS_DIR:./logs}

  # Directory where Lucene indexes will be stored
  index-dir: ${INDEX_DIR:./.log-search/indexes}

  # Log file pattern (regex) - customize for your log file naming
  # Examples:
  #   server-\\d{8}\\.log     matches: server-20260312.log
  #   app-\\d{4}-\\d{2}-\\d{2}\\.log  matches: app-2026-03-12.log
  #   .*\\.log                 matches: any .log file
  file-pattern: ".*\\.log"

  # Date extraction from filename (regex with capture groups)
  # Groups: (year)(month)(day)
  # Examples:
  #   server-(\\d{4})(\\d{2})(\\d{2})\\.log
  #   app-(\\d{4})-(\\d{2})-(\\d{2})\\.log
  filename-date-pattern: "server-(\\d{4})(\\d{2})(\\d{2})\\.log"

  # Log line pattern (regex with capture groups)
  #
  # Simple 3-group pattern: (timestamp)(user)(message)
  #   Example: ^\\[([^\\]]+)\\]\\s*\\[([^\\]]+)\\]\\s*(.*)$
  #   Matches: [2026-03-12T14:30:45.123+13:00] [john.doe] Application started
  #
  # Enhanced 6-group pattern: (timestamp)(thread)(level)(logger)(user)(message)
  #   Example: ^\\[([^\\]]+)\\]\\s+\\[([^\\]]+)\\]\\s+\\[([^\\]]+)\\]\\s+\\[([^\\]]+)\\]\\s+\\[\\]\\s+\\[user:([^\\]]+)\\]\\s+-\\s+(.*)$
  #   Matches: [09 Mar 2026 18:48:36,378] [[ACTIVE] ExecuteThread: '15'...] [INFO ] [curam.abv.filters] [] [user:xyz] - message
  #
  # WebLogic/Enterprise format (6 groups):
  # Note: Thread field is [[ACTIVE]...]'] - not wrapped in additional brackets
  log-line-pattern: "^\\[([^\\]]+)\\]\\s+(.+?)\\s+\\[([^\\]]+)\\]\\s+\\[([^\\]]+)\\]\\s+\\[\\]\\s+\\[user:([^\\]]+)\\]\\s+-\\s+(.*)$"

  # Date format in log lines (Java DateTimeFormatter pattern)
  # Examples:
  #   yyyy-MM-dd'T'HH:mm:ss.SSSXXX    for: 2026-03-12T14:30:45.123+13:00
  #   yyyy-MM-dd HH:mm:ss             for: 2026-03-12 14:30:45
  #   dd MMM yyyy HH:mm:ss,SSS        for: 09 Mar 2026 18:48:36,378 (WebLogic)
  #   dd/MMM/yyyy:HH:mm:ss Z          for: 12/Mar/2026:14:30:45 +1300
  log-datetime-format: "yyyy-MM-dd'T'HH:mm:ss.SSSXXX"

  # Timezone for parsing logs (use your local timezone)
  # Examples: Pacific/Auckland, America/New_York, UTC, Asia/Tokyo
  timezone: "Pacific/Auckland"

  # Number of days to retain indexes (0 = unlimited)
  # Old indexes are automatically deleted to save disk space
  retention-days: 30

  # Auto-watch for new log files
  auto-watch: false

  # Watch interval in seconds (how often to check for new files)
  watch-interval: 60

  # Enable fallback parsing for non-matching log lines
  # When enabled, lines that don't match the primary pattern will still be indexed
  # using auto-detected timestamps or file metadata
  enable-fallback: true

  # Chunking configuration (Metadata-first search architecture)
  chunking:
    enabled: true                     # Enable chunk-based indexing for better performance
    strategy: "ADAPTIVE"              # ADAPTIVE (recommended) or HOURLY

    # Adaptive strategy parameters (used when strategy: ADAPTIVE)
    adaptive:
      target-size-mb: 200             # Target chunk size: 200 MB (range: 150-250 MB)
      min-duration-minutes: 15        # Minimum chunk duration: 15 minutes
      max-duration-hours: 6           # Maximum chunk duration: 6 hours

  # Service name configuration (for multi-service environments)
  service-name: "default-service"     # Default service name if not detected from path
  service-name-pattern: "([^/]+)/.*\\.log"  # Regex to extract service from file path

  # Metadata extraction options
  metadata:
    top-terms-count: 50               # Number of top terms to extract per chunk
    enable-package-extraction: true   # Extract Java package names from stack traces
    enable-exception-extraction: true # Extract exception types for better error search

    # Bloom filter configuration (probabilistic term existence checking)
    bloom-filter:
      enabled: true                   # Enable Bloom filters for efficient term pruning
      false-positive-rate: 0.01       # 1% false positive rate (lower = larger filter)
      estimated-terms-per-chunk: 10000  # Expected unique terms (auto-adjusted)

  # Using legacy single-directory mode
  # When no environments/download-locations are configured,
  # IndexConfigService creates a default "main" index from logs-dir
  #
  # To use explicit multi-index mode, configure environments below
  # or use download-locations configuration

  # Multi-Index Configuration (Optional)
  # Uncomment and configure to index multiple log sources
  #
  # environments:
  #   - name: "production"
  #     display-name: "Production Server"
  #     path: "./logs/production"
  #     file-pattern: "server-\\d{8}\\.log"
  #     auto-watch: true
  #
  #   - name: "staging"
  #     display-name: "Staging Environment"
  #     path: "./logs/staging"
  #     file-pattern: "app-.*\\.log"
  #     auto-watch: true
  #
  #   - name: "development"
  #     display-name: "Development Logs"
  #     path: "./logs/dev"
  #     file-pattern: ".*\\.log"
  #     auto-watch: false

  # Hierarchical Environment Configuration (Optional)
  # Organize your log sources by Environment → System (Application) → Servers (Nodes)
  # This maintains the natural hierarchy of your infrastructure
  #
  # environments:
  #   # Production Environment
  #   production:
  #     display-name: "Production"
  #     enabled: true
  #     systems:
  #       # Payment Service - Multiple Nodes
  #       - name: "payment-service"
  #         display-name: "Payment Service"
  #         enabled: true
  #         target-path: "./logs/production/payment"
  #         file-pattern: ".*\\.log"
  #         retention-days: 90
  #         auto-watch: true
  #         requires-auth: true
  #         default-username: "admin"
  #         servers:
  #           - name: "Node 1"
  #             url: "http://payment-node1.prod:7001/logs/"
  #             enabled: true
  #           - name: "Node 2"
  #             url: "http://payment-node2.prod:7001/logs/"
  #             enabled: true
  #           - name: "Node 3"
  #             url: "http://payment-node3.prod:7001/logs/"
  #             enabled: true
  #
  #       # Order Service - Multiple Nodes
  #       - name: "order-service"
  #         display-name: "Order Management"
  #         enabled: true
  #         target-path: "./logs/production/orders"
  #         file-pattern: "server-.*\\.log"
  #         retention-days: 90
  #         auto-watch: true
  #         requires-auth: true
  #         default-username: "readonly"
  #         servers:
  #           - name: "Server A"
  #             url: "http://order-a.prod:8080/archived-logs/"
  #           - name: "Server B"
  #             url: "http://order-b.prod:8080/archived-logs/"
  #
  #   # UAT Environment
  #   uat:
  #     display-name: "UAT Environment"
  #     enabled: true
  #     systems:
  #       # Payment Service UAT - Single Node
  #       - name: "payment-service"
  #         display-name: "Payment Service UAT"
  #         url: "http://payment-uat:7001/logs/"  # Single-server shorthand
  #         enabled: true
  #         target-path: "./logs/uat/payment"
  #         file-pattern: ".*\\.log"
  #         retention-days: 30
  #         requires-auth: true
  #         default-username: "testuser"
  #
  #       # Integration Platform - Multiple Nodes
  #       - name: "integration"
  #         display-name: "Integration Platform"
  #         enabled: true
