# External Log Search Configuration
# Place this file alongside the JAR or in a ./config/ directory
# Override any settings by editing this file - no need to rebuild the JAR!

server:
  port: 8080

# JVM Configuration (used by start.sh / start.bat)
jvm:
  # Heap size configuration
  # Examples: 512m, 1g, 2g, 4g, 8g, 12g
  # Recommended:
  #   - 1-2 GB raw logs/day: 2g
  #   - 5 GB raw logs/day: 4-6g
  #   - 10 GB raw logs/day: 8-12g
  #   - 20+ GB raw logs/day: 16g+
  heap-min: ${JVM_HEAP_MIN:2g}
  heap-max: ${JVM_HEAP_MAX:4g}

  # Additional JVM options (optional)
  # Default uses G1GC for better performance with large heaps
  extra-opts: ${JVM_EXTRA_OPTS:-XX:+UseG1GC -XX:MaxGCPauseMillis=200}

log-search:
  # Directory containing log files to index
  logs-dir: ${LOGS_DIR:./logs}

  # Directory where Lucene indexes will be stored
  index-dir: ${INDEX_DIR:./.log-search/indexes}

  # Log file pattern (regex) - customize for your log file naming
  # Examples:
  #   server-\\d{8}\\.log     matches: server-20260312.log
  #   app-\\d{4}-\\d{2}-\\d{2}\\.log  matches: app-2026-03-12.log
  #   .*\\.log                 matches: any .log file
  file-pattern: ".*\\.log"

  # Date extraction from filename (regex with capture groups)
  # Groups: (year)(month)(day)
  # Examples:
  #   server-(\\d{4})(\\d{2})(\\d{2})\\.log
  #   app-(\\d{4})-(\\d{2})-(\\d{2})\\.log
  filename-date-pattern: "server-(\\d{4})(\\d{2})(\\d{2})\\.log"

  # Log line pattern (regex with capture groups)
  #
  # Simple 3-group pattern: (timestamp)(user)(message)
  #   Example: ^\\[([^\\]]+)\\]\\s*\\[([^\\]]+)\\]\\s*(.*)$
  #   Matches: [2026-03-12T14:30:45.123+13:00] [john.doe] Application started
  #
  # Enhanced 6-group pattern: (timestamp)(thread)(level)(logger)(user)(message)
  #   Example: ^\\[([^\\]]+)\\]\\s+\\[([^\\]]+)\\]\\s+\\[([^\\]]+)\\]\\s+\\[([^\\]]+)\\]\\s+\\[\\]\\s+\\[user:([^\\]]+)\\]\\s+-\\s+(.*)$
  #   Matches: [09 Mar 2026 18:48:36,378] [[ACTIVE] ExecuteThread: '15'...] [INFO ] [curam.abv.filters] [] [user:xyz] - message
  #
  # WebLogic/Enterprise format (6 groups):
  # Note: Thread field is [[ACTIVE]...]'] - not wrapped in additional brackets
  log-line-pattern: "^\\[([^\\]]+)\\]\\s+(.+?)\\s+\\[([^\\]]+)\\]\\s+\\[([^\\]]+)\\]\\s+\\[\\]\\s+\\[user:([^\\]]+)\\]\\s+-\\s+(.*)$"

  # Date format in log lines (Java DateTimeFormatter pattern)
  # Examples:
  #   yyyy-MM-dd'T'HH:mm:ss.SSSXXX    for: 2026-03-12T14:30:45.123+13:00
  #   yyyy-MM-dd HH:mm:ss             for: 2026-03-12 14:30:45
  #   dd MMM yyyy HH:mm:ss,SSS        for: 09 Mar 2026 18:48:36,378 (WebLogic)
  #   dd/MMM/yyyy:HH:mm:ss Z          for: 12/Mar/2026:14:30:45 +1300
  log-datetime-format: "yyyy-MM-dd'T'HH:mm:ss.SSSXXX"

  # Timezone for parsing logs (use your local timezone)
  # Examples: Pacific/Auckland, America/New_York, UTC, Asia/Tokyo
  timezone: "Pacific/Auckland"

  # Number of days to retain indexes (0 = unlimited)
  # Old indexes are automatically deleted to save disk space
  retention-days: 30

  # Auto-watch for new log files
  auto-watch: true

  # Watch interval in seconds (how often to check for new files)
  watch-interval: 60

  # Enable fallback parsing for non-matching log lines
  # When enabled, lines that don't match the primary pattern will still be indexed
  # using auto-detected timestamps or file metadata
  enable-fallback: true

  # Hierarchical environment-based configuration
  # Organize by environment first, then systems within each environment
  environments:
    # Development Environment 1
    d1:
      display-name: "Development 1"
      enabled: true
      systems:
        # CMS - Multi-server example (4 servers)
        - name: cms
          display-name: "CMS"
          target-path: ./logs/d1/cms
          file-pattern: "server-\\d{8}\\.log"
          requires-auth: false
          retention-days: 7
          service-type: APPLICATION
          servers:
            - name: "Server 1"
              url: "http://d1-cms1.server.com/logs/"
              enabled: true
            - name: "Server 2"
              url: "http://d1-cms2.server.com/logs/"
              enabled: true
            - name: "Server 3"
              url: "http://d1-cms3.server.com/logs/"
              enabled: true
            - name: "Server 4"
              url: "http://d1-cms4.server.com/logs/"
              enabled: true

        # Payment Service - Multi-server example (3 servers)
        - name: payment
          display-name: "Payment Service"
          target-path: ./logs/d1/payment
          file-pattern: "server-\\d{8}\\.log"
          requires-auth: false
          retention-days: 7
          service-type: APPLICATION
          servers:
            - name: "Node 1"
              url: "http://d1-payment1.server.com/logs/"
            - name: "Node 2"
              url: "http://d1-payment2.server.com/logs/"
            - name: "Node 3"
              url: "http://d1-payment3.server.com/logs/"

        # OBMan - Single server (backward compatible)
        - name: obman
          display-name: "OBMan"
          url: "http://d1.server.com/logs/obman/"
          target-path: ./logs/d1/obman
          file-pattern: ".*\\.log"
          requires-auth: false
          retention-days: 7
          service-type: APPLICATION

    # Development Environment 2
    d2:
      display-name: "Development 2"
      enabled: true
      systems:
        # CMS - Single server
        - name: cms
          display-name: "CMS"
          url: "http://d2.server.com/logs/cms/"
          target-path: ./logs/d2/cms
          file-pattern: "server-\\d{8}\\.log"
          requires-auth: false
          retention-days: 7
          service-type: APPLICATION

        # Payment Service - 2 servers
        - name: payment
          display-name: "Payment Service"
          target-path: ./logs/d2/payment
          file-pattern: "server-\\d{8}\\.log"
          requires-auth: false
          retention-days: 7
          service-type: APPLICATION
          servers:
            - name: "Primary"
              url: "http://d2-payment1.server.com/logs/"
            - name: "Secondary"
              url: "http://d2-payment2.server.com/logs/"

        # OBMan - Single server
        - name: obman
          display-name: "OBMan"
          url: "http://d2.server.com/logs/obman/"
          target-path: ./logs/d2/obman
          file-pattern: ".*\\.log"
          requires-auth: false
          retention-days: 7
          service-type: APPLICATION

        # IIB - Single server
        - name: iib
          display-name: "IBM Integration Bus"
          url: "http://d2.server.com/logs/iib/"
          target-path: ./logs/d2/iib
          file-pattern: ".*\\.log"
          requires-auth: false
          retention-days: 7
          service-type: INTEGRATION

    # UAT Environment 1
    uat1:
      display-name: "UAT 1"
      enabled: true
      systems:
        - name: cms
          display-name: "CMS"
          url: "http://uat1.server.com/logs/cms/"
          target-path: ./logs/uat1/cms
          file-pattern: "server-\\d{8}\\.log"
          requires-auth: true
          default-username: "viewer"
          retention-days: 30
          service-type: APPLICATION

        - name: payment
          display-name: "Payment Service"
          url: "http://uat1.server.com/logs/payment/"
          target-path: ./logs/uat1/payment
          file-pattern: "server-\\d{8}\\.log"
          requires-auth: true
          default-username: "viewer"
          retention-days: 30
          service-type: APPLICATION

        - name: obman
          display-name: "OBMan"
          url: "http://uat1.server.com/logs/obman/"
          target-path: ./logs/uat1/obman
          file-pattern: ".*\\.log"
          requires-auth: true
          default-username: "viewer"
          retention-days: 30
          service-type: APPLICATION

        - name: iib
          display-name: "IBM Integration Bus"
          url: "http://uat1.server.com/logs/iib/"
          target-path: ./logs/uat1/iib
          file-pattern: ".*\\.log"
          requires-auth: true
          default-username: "viewer"
          retention-days: 30
          service-type: INTEGRATION

    # Production Environment 1 (disabled by default for safety)
    prod1:
      display-name: "Production 1"
      enabled: false
      systems:
        - name: cms
          display-name: "CMS"
          url: "http://prod1.server.com/logs/cms/"
          target-path: ./logs/prod1/cms
          file-pattern: "server-\\d{8}\\.log"
          requires-auth: true
          default-username: "readonly"
          retention-days: 90
          service-type: APPLICATION

        - name: payment
          display-name: "Payment Service"
          url: "http://prod1.server.com/logs/payment/"
          target-path: ./logs/prod1/payment
          file-pattern: "server-\\d{8}\\.log"
          requires-auth: true
          default-username: "readonly"
          retention-days: 90
          service-type: APPLICATION

        - name: iib
          display-name: "IBM Integration Bus"
          url: "http://prod1.server.com/logs/iib/"
          target-path: ./logs/prod1/iib
          file-pattern: ".*\\.log"
          requires-auth: true
          default-username: "readonly"
          retention-days: 90
          service-type: INTEGRATION

logging:
  level:
    com.lsearch.logsearch: INFO
