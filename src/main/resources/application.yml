server:
  port: 8080

log-search:
  # Directory containing log files to index
  logs-dir: ${LOGS_DIR:./logs}

  # Directory where Lucene indexes will be stored
  index-dir: ${INDEX_DIR:./.log-search/indexes}

  # Log file pattern (regex)
  file-pattern: "server-\\d{8}\\.log"

  # Date extraction from filename (regex with named group)
  filename-date-pattern: "server-(\\d{4})(\\d{2})(\\d{2})\\.log"

  # Log line pattern (regex - supports 3-group or 6-group patterns)
  # 3-group: (timestamp)(user)(message)
  # 6-group: (timestamp)(thread)(level)(logger)(user)(message)
  # Current: 6-group pattern for WebLogic-style logs with nested brackets in thread field
  log-line-pattern: "^\\[([^\\]]+)\\]\\s+\\[(.+?)\\]\\s+\\[([A-Z]+)\\s*\\]\\s+\\[([^\\]]+)\\]\\s+\\[\\]\\s+\\[user:([^\\]]+)\\]\\s+-\\s+(.*)$"

  # Date format in log lines (Java DateTimeFormatter pattern)
  # Updated for format: 13 Mar 2026 17:19:25,027
  log-datetime-format: "dd MMM yyyy HH:mm:ss,SSS"

  # Timezone for parsing logs
  timezone: "Pacific/Auckland"

  # Number of days to retain indexes (0 = unlimited)
  retention-days: 30

  # Auto-watch for new log files
  # Set to false to disable automatic scanning (use "Re-Index" button in UI instead)
  # Recommended: false for most users to reduce background CPU usage
  auto-watch: false

  # Watch interval in seconds (only applies if auto-watch is true)
  # Default: 60 (check every minute)
  # Recommended: 3600 (check every hour) or disable auto-watch entirely
  watch-interval: 60

  # Default log download locations
  # Configure common log server URLs for quick access
  download-locations:
    - name: "Dev Server 1"
      url: "http://dev1.example.com/logs/"
      description: "Development environment 1 logs"
      enabled: true

    - name: "UAT Server"
      url: "http://uat.example.com/logs/"
      description: "UAT environment logs"
      enabled: true

    - name: "Production Server"
      url: "http://prod.example.com/logs/"
      description: "Production logs (read-only access)"
      enabled: false
      requires-auth: true

logging:
  level:
    # Application logging level: ERROR, WARN, INFO, DEBUG, TRACE
    # INFO: Show all operations (default, verbose)
    # WARN: Only show warnings and errors (recommended for quiet operation)
    # ERROR: Only show errors (minimal logging)
    com.lsearch.logsearch: INFO
